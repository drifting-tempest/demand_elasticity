<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Elasticity Calculator</title>
        <link rel="stylsheet" href="">
    </head>

    <body>

        <div class="container">
            <h>Elasticity of Demand Calculator</h>

            <div class="form">

                <form id="form">

                    <label for="p0">Original Price : <input id="p0" type="number" step="0.01" required></label><br>
                    <label for="q0">Original Quantity : <input id="q0" type="number" step="0.01" required></label><br>
                    <label for="p1">New Price : <input id="p1" type="number" step="0.01" required></label><br>
                    <label for="q1">New Quantity : <input id="q1" type="number" step="0.01" required></label><br>

                    <button class="btn" type="submit">Calculate!</button>

                </form>

            </div>

            <div id="results" class="results hidden">

                <p>Elasticity is: <span id="ela"></span></p>
                <p id="type">Elasticity Type </p>

            </div>

        </div>

        <script src="script.js"></script>
    </body>
</html>
